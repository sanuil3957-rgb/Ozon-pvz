<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ozon ПВЗ — Сканер и панель</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0B0F1C;
            min-height: 100vh;
        }
        
        /* Режимы */
        .mode-phone, .mode-pc { display: none; }
        body.phone-mode .mode-phone { display: block; }
        body.pc-mode .mode-pc { display: block; }
        
        /* Общие стили */
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header {
            background: #0F172A;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            background: #FF6B00;
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }
        .logo-text {
            font-size: 24px;
            font-weight: 800;
            color: white;
        }
        .stats {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #1E293B;
            padding: 12px 24px;
            border-radius: 20px;
            text-align: center;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 800;
            color: #FF6B00;
        }
        .stat-label {
            font-size: 12px;
            color: #94A3B8;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 24px;
        }
        .card {
            background: #0F172A;
            border-radius: 24px;
            padding: 20px;
        }
        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: white;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .card-title button {
            background: #FF6B00;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .list {
            max-height: 400px;
            overflow-y: auto;
        }
        .item {
            background: #1E293B;
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .item-info { flex: 2; }
        .item-name { color: white; font-weight: 600; font-size: 14px; }
        .item-code { font-size: 11px; color: #6B7280; margin-top: 4px; }
        .item-price { font-size: 16px; font-weight: 700; color: #FF6B00; }
        .item-quantity { font-size: 12px; color: #4ADE80; }
        .btn-sm {
            background: #FF6B00;
            border: none;
            padding: 6px 12px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-green { background: #4ADE80; color: #0B0F1C; }
        .empty { text-align: center; padding: 40px; color: #4B5563; }
        .scan-item {
            background: #1E293B;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 8px;
            font-size: 12px;
        }
        .sync-status {
            font-size: 11px;
            color: #4ADE80;
            margin-top: 8px;
            text-align: center;
        }
        
        /* Стили для телефона */
        .phone-container {
            max-width: 450px;
            margin: 0 auto;
            padding: 20px;
        }
        .phone-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .phone-logo {
            background: #FF6B00;
            display: inline-block;
            padding: 12px 24px;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            font-size: 18px;
        }
        .input-box {
            background: #0F172A;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .input-label {
            color: #94A3B8;
            font-size: 12px;
            margin-bottom: 8px;
        }
        .code-input {
            width: 100%;
            background: #1E293B;
            border: none;
            padding: 16px;
            border-radius: 60px;
            color: white;
            font-size: 18px;
            font-family: monospace;
            text-align: center;
            outline: none;
        }
        .code-input:focus { border: 1px solid #FF6B00; }
        .btn {
            width: 100%;
            background: #FF6B00;
            border: none;
            padding: 16px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 16px;
            color: white;
            cursor: pointer;
            margin-top: 16px;
        }
        .result-card {
            background: #0F172A;
            border-radius: 24px;
            padding: 16px;
            margin-top: 20px;
        }
        .result-success { border-left: 4px solid #4ADE80; }
        .result-error { border-left: 4px solid #FF4444; }
        .result-info { border-left: 4px solid #FF6B00; }
        .result-text { color: white; font-size: 14px; }
        .keyboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        .key {
            background: #1E293B;
            border: none;
            padding: 16px;
            border-radius: 60px;
            color: white;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
        }
        .key-del { background: #3A1E1E; color: #FF6B6B; }
        .key-clear { background: #334155; }
        .mode-switch {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1E293B;
            border: none;
            padding: 10px 16px;
            border-radius: 40px;
            color: white;
            font-size: 12px;
            cursor: pointer;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <button class="mode-switch" onclick="toggleMode()">🔄 Переключить режим</button>

    <!-- Режим телефона (сканер) -->
    <div class="mode-phone">
        <div class="phone-container">
            <div class="phone-header">
                <div class="phone-logo">📷 Ozon Сканер</div>
                <div style="color:#94A3B8; font-size:12px; margin-top:8px;">Введите штрихкод</div>
            </div>

            <div id="phoneSyncStatus" class="sync-status">🟢 Готов к сканированию</div>

            <div class="input-box">
                <div class="input-label">📱 Штрихкод или номер заказа</div>
                <input type="text" id="codeInput" class="code-input" placeholder="Введите код..." autocomplete="off">
                <button id="submitBtn" class="btn">✅ Отсканировать</button>
                
                <div class="keyboard">
                    <button class="key" data-key="1">1</button>
                    <button class="key" data-key="2">2</button>
                    <button class="key" data-key="3">3</button>
                    <button class="key" data-key="4">4</button>
                    <button class="key" data-key="5">5</button>
                    <button class="key" data-key="6">6</button>
                    <button class="key" data-key="7">7</button>
                    <button class="key" data-key="8">8</button>
                    <button class="key" data-key="9">9</button>
                    <button class="key" data-key="0">0</button>
                    <button class="key key-del" data-action="del">⌫</button>
                    <button class="key key-clear" data-action="clear">C</button>
                </div>
            </div>

            <div id="lastResult"></div>
            
            <div class="input-label" style="margin-top:20px; margin-bottom:8px;">📋 Последние операции</div>
            <div id="historyList"></div>
        </div>
    </div>

    <!-- Режим ПК (панель ПВЗ) -->
    <div class="mode-pc">
        <div class="container">
            <div class="header">
                <div class="logo">
                    <div class="logo-icon">📦</div>
                    <div class="logo-text">Ozon ПВЗ — Панель управления</div>
                </div>
                <div class="stats">
                    <div class="stat-card"><div class="stat-value" id="acceptedToday">0</div><div class="stat-label">Принято сегодня</div></div>
                    <div class="stat-card"><div class="stat-value" id="givenToday">0</div><div class="stat-label">Выдано сегодня</div></div>
                    <div class="stat-card"><div class="stat-value" id="totalMoney">0</div><div class="stat-label">Выручка</div></div>
                    <div class="stat-card"><div class="stat-value" id="pendingCount">0</div><div class="stat-label">На приёмке</div></div>
                </div>
            </div>

            <div class="grid">
                <div class="card">
                    <div class="card-title">
                        📥 На приёмку
                        <button id="acceptAllBtn">✅ Принять всё</button>
                    </div>
                    <div id="pendingList" class="list"></div>
                </div>

                <div class="card">
                    <div class="card-title">
                        🎁 Заказы на выдачу
                    </div>
                    <div id="ordersList" class="list"></div>
                </div>

                <div class="card">
                    <div class="card-title">
                        📦 Склад
                    </div>
                    <div id="stockList" class="list"></div>
                </div>

                <div class="card">
                    <div class="card-title">
                        📋 История сканирований
                        <button id="clearHistoryBtn">Очистить</button>
                    </div>
                    <div id="scansList" class="list"></div>
                </div>
            </div>
            <div id="pcSyncStatus" class="sync-status">🟢 Данные синхронизируются</div>
        </div>
    </div>

    <script>
        // ========== ДАННЫЕ ПО УМОЛЧАНИЮ ==========
        let pvzData = {
            pendingItems: [
                { id: 1, name: "Xiaomi Note 12", barcode: "4601234567890", price: 24990, quantity: 5 },
                { id: 2, name: "Huawei FreeBuds", barcode: "4601234567891", price: 4990, quantity: 10 },
                { id: 3, name: "Зарядка 65W", barcode: "4601234567892", price: 1290, quantity: 15 },
                { id: 4, name: "Чехол iPhone 15", barcode: "4601234567893", price: 890, quantity: 20 },
                { id: 5, name: "Power Bank", barcode: "4601234567894", price: 2990, quantity: 8 }
            ],
            stock: [
                { id: 6, name: "Фитнес-браслет", barcode: "4601234567895", price: 3990, quantity: 12, status: "ready" },
                { id: 7, name: "Bluetooth колонка", barcode: "4601234567896", price: 3490, quantity: 6, status: "ready" }
            ],
            orders: [
                { id: "OZ-1001", customer: "Анна Смирнова", phone: "+7 999 123-45-67", items: "Чехол iPhone 15 (2 шт.)", total: 1780, status: "ready", barcode: "ORD1001" },
                { id: "OZ-1002", customer: "Михаил Петров", phone: "+7 999 234-56-78", items: "Фитнес-браслет (1 шт.)", total: 3990, status: "ready", barcode: "ORD1002" },
                { id: "OZ-1003", customer: "Елена Козлова", phone: "+7 999 345-67-89", items: "Power Bank (1 шт.)", total: 2990, status: "ready", barcode: "ORD1003" }
            ],
            scans: [],
            stats: { acceptedToday: 0, givenToday: 0, totalMoney: 0 }
        };

        let lastCode = '';
        let lastTime = 0;
        let phoneHistory = [];

        // ========== ОПРЕДЕЛЕНИЕ РЕЖИМА ==========
        function detectMode() {
            const isMobile = window.innerWidth <= 768 || /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
            if (isMobile) {
                document.body.classList.add('phone-mode');
                document.body.classList.remove('pc-mode');
                initPhoneMode();
            } else {
                document.body.classList.add('pc-mode');
                document.body.classList.remove('phone-mode');
                initPCMode();
            }
        }

        // ========== ОБЩИЕ ФУНКЦИИ ==========
        function loadData() {
            const saved = localStorage.getItem('ozon_pvz_data');
            if (saved) {
                pvzData = JSON.parse(saved);
            } else {
                saveData();
            }
        }

        function saveData() {
            localStorage.setItem('ozon_pvz_data', JSON.stringify(pvzData));
            // Уведомляем другие вкладки
            localStorage.setItem('ozon_update', Date.now().toString());
        }

        // ========== РЕЖИМ ТЕЛЕФОНА ==========
        function initPhoneMode() {
            loadData();
            
            // Загружаем историю телефона
            const savedHistory = localStorage.getItem('phone_scan_history');
            if (savedHistory) phoneHistory = JSON.parse(savedHistory);
            renderPhoneHistory();

            const codeInput = document.getElementById('codeInput');
            const submitBtn = document.getElementById('submitBtn');
            const lastResultDiv = document.getElementById('lastResult');
            const phoneSyncStatus = document.getElementById('phoneSyncStatus');

            function renderPhoneHistory() {
                const historyDiv = document.getElementById('historyList');
                if (phoneHistory.length === 0) {
                    historyDiv.innerHTML = '<div style="color:#4B5563; text-align:center; padding:20px;">Нет операций</div>';
                    return;
                }
                let html = '';
                phoneHistory.slice(0, 10).forEach(item => {
                    let color = item.result.includes('✅') || item.result.includes('🎁') ? '#4ADE80' : (item.result.includes('❌') ? '#FF6B6B' : '#FF6B00');
                    html += `<div class="history-item" style="background:#0F172A; border-radius:16px; padding:12px; margin-bottom:8px;">
                                <div style="color:${color}">${item.result}</div>
                                <div style="font-size:10px; color:#6B7280;">${item.time}</div>
                            </div>`;
                });
                historyDiv.innerHTML = html;
            }

            function addToPhoneHistory(code, result) {
                phoneHistory.unshift({ code, result, time: new Date().toLocaleTimeString() });
                if (phoneHistory.length > 20) phoneHistory.pop();
                localStorage.setItem('phone_scan_history', JSON.stringify(phoneHistory));
                renderPhoneHistory();
            }

            function sendScan(code) {
                const now = Date.now();
                if (lastCode === code && now - lastTime < 1500) return;
                lastCode = code;
                lastTime = now;

                let result = { success: false, message: '', type: '' };

                // Ищем в товарах на приёмку
                const pendingIndex = pvzData.pendingItems.findIndex(i => i.barcode === code);
                if (pendingIndex !== -1) {
                    const item = pvzData.pendingItems[pendingIndex];
                    pvzData.pendingItems.splice(pendingIndex, 1);
                    pvzData.stock.push({ ...item, status: 'ready' });
                    pvzData.stats.acceptedToday += item.quantity;
                    result = { success: true, message: `✅ Принят: ${item.name} (${item.quantity} шт.)`, type: 'accept' };
                }

                // Ищем в заказах
                const orderIndex = pvzData.orders.findIndex(o => o.barcode === code || o.id === code);
                if (orderIndex !== -1) {
                    const order = pvzData.orders[orderIndex];
                    if (order.status === 'ready') {
                        order.status = 'given';
                        pvzData.stats.givenToday++;
                        pvzData.stats.totalMoney += order.total;
                        result = { success: true, message: `🎁 Выдан заказ ${order.id} (${order.customer})`, type: 'give' };
                    } else if (order.status === 'given') {
                        result = { success: false, message: `❌ Заказ ${order.id} уже выдан`, type: 'error' };
                    }
                }

                // Ищем на складе
                if (!result.message) {
                    const stockItem = pvzData.stock.find(i => i.barcode === code);
                    if (stockItem) {
                        result = { success: true, message: `📦 ${stockItem.name} - на складе (${stockItem.quantity} шт.)`, type: 'info' };
                    } else {
                        result = { success: false, message: `⚠️ Штрихкод ${code} не найден`, type: 'error' };
                    }
                }

                // Сохраняем и показываем
                saveData();
                
                const resultClass = result.type === 'error' ? 'result-error' : (result.type === 'accept' || result.type === 'give' ? 'result-success' : 'result-info');
                const icon = result.type === 'accept' ? '✅' : result.type === 'give' ? '🎁' : result.type === 'error' ? '⚠️' : 'ℹ️';
                
                lastResultDiv.innerHTML = `
                    <div class="result-card ${resultClass}">
                        <div class="result-text">${icon} ${result.message}</div>
                        <div class="result-time">${new Date().toLocaleTimeString()}</div>
                    </div>
                `;
                
                addToPhoneHistory(code, result.message);
                
                if (result.success && navigator.vibrate) navigator.vibrate(100);
                
                codeInput.value = '';
                codeInput.focus();
                
                phoneSyncStatus.innerHTML = '✅ Отправлено';
                setTimeout(() => { phoneSyncStatus.innerHTML = '🟢 Готов к сканированию'; }, 2000);
            }

            submitBtn.onclick = () => {
                const code = codeInput.value.trim();
                if (code) sendScan(code);
            };

            codeInput.onkeypress = (e) => {
                if (e.key === 'Enter') {
                    const code = codeInput.value.trim();
                    if (code) sendScan(code);
                }
            };

            // Виртуальная клавиатура
            document.querySelectorAll('.key').forEach(btn => {
                btn.onclick = () => {
                    if (btn.dataset.key) {
                        codeInput.value += btn.dataset.key;
                    } else if (btn.dataset.action === 'del') {
                        codeInput.value = codeInput.value.slice(0, -1);
                    } else if (btn.dataset.action === 'clear') {
                        codeInput.value = '';
                    }
                    codeInput.focus();
                };
            });
        }

        // ========== РЕЖИМ ПК ==========
        function initPCMode() {
            loadData();
            renderAllPC();

            // Слушаем изменения в localStorage
            window.addEventListener('storage', (e) => {
                if (e.key === 'ozon_pvz_data' || e.key === 'ozon_update') {
                    loadData();
                    renderAllPC();
                    document.getElementById('pcSyncStatus').innerHTML = '✅ Данные обновлены';
                    setTimeout(() => { document.getElementById('pcSyncStatus').innerHTML = '🟢 Данные синхронизируются'; }, 2000);
                }
            });
        }

        function renderAllPC() {
            renderPending();
            renderOrders();
            renderStock();
            renderScans();
            updateStatsPC();
        }

        function renderPending() {
            const container = document.getElementById('pendingList');
            if (!pvzData.pendingItems || pvzData.pendingItems.length === 0) {
                container.innerHTML = '<div class="empty">✅ Нет товаров на приёмку</div>';
                return;
            }
            let html = '';
            pvzData.pendingItems.forEach(item => {
                html += `<div class="item">
                            <div class="item-info">
                                <div class="item-name">📦 ${item.name}</div>
                                <div class="item-code">${item.barcode}</div>
                                <div class="item-quantity">📦 ${item.quantity} шт.</div>
                            </div>
                            <div class="item-price">${item.price.toLocaleString()} ₽</div>
                            <div class="item-actions">
                                <button class="btn-sm" onclick="window.acceptItemPC(${item.id})">✅ Принять</button>
                            </div>
                        </div>`;
            });
            container.innerHTML = html;
        }

        function renderOrders() {
            const container = document.getElementById('ordersList');
            const readyOrders = (pvzData.orders || []).filter(o => o.status === 'ready');
            if (readyOrders.length === 0) {
                container.innerHTML = '<div class="empty">🎁 Нет заказов на выдачу</div>';
                return;
            }
            let html = '';
            readyOrders.forEach(order => {
                html += `<div class="item">
                            <div class="item-info">
                                <div class="item-name">Заказ ${order.id}</div>
                                <div class="item-code">${order.customer} • ${order.phone}</div>
                                <div class="item-code">${order.items}</div>
                            </div>
                            <div class="item-price">${order.total.toLocaleString()} ₽</div>
                            <div class="item-actions">
                                <button class="btn-sm btn-green" onclick="window.giveOrderPC('${order.id}')">🎁 Выдать</button>
                            </div>
                        </div>`;
            });
            container.innerHTML = html;
        }

        function renderStock() {
            const container = document.getElementById('stockList');
            if (!pvzData.stock || pvzData.stock.length === 0) {
                container.innerHTML = '<div class="empty">📦 Склад пуст</div>';
                return;
            }
            let html = '';
            pvzData.stock.forEach(item => {
                html += `<div class="item">
                            <div class="item-info">
                                <div class="item-name">📦 ${item.name}</div>
                                <div class="item-code">${item.barcode}</div>
                                <div class="item-quantity">📦 ${item.quantity} шт.</div>
                            </div>
                            <div class="item-price">${item.price.toLocaleString()} ₽</div>
                            <div class="item-status" style="color:#4ADE80;">✅ Готов</div>
                        </div>`;
            });
            container.innerHTML = html;
        }

        function renderScans() {
            const container = document.getElementById('scansList');
            if (!pvzData.scans || pvzData.scans.length === 0) {
                container.innerHTML = '<div class="empty">📷 Нет сканирований</div>';
                return;
            }
            let html = '';
            pvzData.scans.slice(0, 20).forEach(scan => {
                let color = scan.result.includes('✅') || scan.result.includes('🎁') ? '#4ADE80' : (scan.result.includes('❌') ? '#FF6B6B' : '#FF6B00');
                html += `<div class="scan-item">
                            <div style="color:${color}">📷 ${scan.code}</div>
                            <div style="color:${color}">${scan.result}</div>
                            <div class="scan-time">${scan.time}</div>
                        </div>`;
            });
            container.innerHTML = html;
        }

        function updateStatsPC() {
            document.getElementById('acceptedToday').innerText = pvzData.stats.acceptedToday || 0;
            document.getElementById('givenToday').innerText = pvzData.stats.givenToday || 0;
            document.getElementById('totalMoney').innerText = (pvzData.stats.totalMoney || 0).toLocaleString() + ' ₽';
            document.getElementById('pendingCount').innerText = (pvzData.pendingItems || []).length;
        }

        window.acceptItemPC = function(id) {
            const item = pvzData.pendingItems.find(i => i.id === id);
            if (item) {
                pvzData.pendingItems = pvzData.pendingItems.filter(i => i.id !== id);
                pvzData.stock.push({ ...item, status: 'ready' });
                pvzData.stats.acceptedToday += item.quantity;
                pvzData.scans.unshift({ code: item.barcode, time: new Date().toLocaleTimeString(), result: `✅ Принят: ${item.name}` });
                if (pvzData.scans.length > 30) pvzData.scans.pop();
                saveData();
                renderAllPC();
                showToastPC(`✅ ${item.name} принят`);
            }
        };

        window.giveOrderPC = function(orderId) {
            const order = pvzData.orders.find(o => o.id === orderId);
            if (order && order.status === 'ready') {
                order.status = 'given';
                pvzData.stats.givenToday++;
                pvzData.stats.totalMoney += order.total;
                pvzData.scans.unshift({ code: order.barcode, time: new Date().toLocaleTimeString(), result: `🎁 Выдан заказ ${order.id}` });
                if (pvzData.scans.length > 30) pvzData.scans.pop();
                saveData();
                renderAllPC();
                showToastPC(`🎁 Заказ ${orderId} выдан`);
            }
        };

        function acceptAllPC() {
            if (!pvzData.pendingItems.length) return;
            pvzData.pendingItems.forEach(item => {
                pvzData.stock.push({ ...item, status: 'ready' });
                pvzData.stats.acceptedToday += item.quantity;
            });
            pvzData.pendingItems = [];
            saveData();
            renderAllPC();
            showToastPC(`✅ Принято всё`);
        }

        function clearHistoryPC() {
            pvzData.scans = [];
            saveData();
            renderScans();
            showToastPC('🗑️ История очищена');
        }

        function showToastPC(msg) {
            const toast = document.createElement('div');
            toast.innerText = msg;
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.background = '#1E293B';
            toast.style.padding = '10px 20px';
            toast.style.borderRadius = '40px';
            toast.style.color = 'white';
            toast.style.zIndex = '1000';
            toast.style.borderLeft = '3px solid #FF6B00';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        document.getElementById('acceptAllBtn').onclick = acceptAllPC;
        document.getElementById('clearHistoryBtn').onclick = clearHistoryPC;

        // ========== ПЕРЕКЛЮЧЕНИЕ РЕЖИМА ==========
        function toggleMode() {
            if (document.body.classList.contains('phone-mode')) {
                document.body.classList.remove('phone-mode');
                document.body.classList.add('pc-mode');
                initPCMode();
                localStorage.setItem('ozon_mode', 'pc');
            } else {
                document.body.classList.remove('pc-mode');
                document.body.classList.add('phone-mode');
                initPhoneMode();
                localStorage.setItem('ozon_mode', 'phone');
            }
        }

        window.toggleMode = toggleMode;

        // Запуск
        const savedMode = localStorage.getItem('ozon_mode');
        if (savedMode === 'pc' && !(/Android|iPhone|iPad|iPod/i.test(navigator.userAgent))) {
            document.body.classList.add('pc-mode');
            initPCMode();
        } else {
            detectMode();
        }
    </script>
</body>
</html>
